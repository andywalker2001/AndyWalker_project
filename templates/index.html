<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AC Range - Interactive</title>
    <style>
      body { margin:0; font-family: Arial, sans-serif; }
      .container { display:flex; height:100vh; }
      .left { width:340px; padding:16px; box-sizing:border-box; border-right:1px solid #ddd; }
      .right { flex:1; }
      label { display:block; margin-top:8px; font-weight:600; }
      input[type="text"], input[type="number"] { width:100%; padding:8px; box-sizing:border-box; }
      button { margin-top:12px; padding:8px 12px; }
      iframe { width:100%; height:100%; border:0; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <h3>Defaults</h3>
        <label>Live</label>
        <input type="checkbox" id="live">

        <label>Range limit (miles)</label>
        <input type="number" id="range_limit" step="1">

        <label>Latitude</label>
        <input type="text" id="latitude">

        <label>Longitude</label>
        <input type="text" id="longitude">

        <label>Altitude (m)</label>
        <input type="number" id="altitude" step="0.1">

        <button id="updateBtn">Update Map</button>
        <p id="status" style="margin-top:8px;color:#333"></p>
      </div>
      <div class="right">
        <iframe id="mapFrame" src="/map"></iframe>
      </div>
    </div>

    <script>
      let lastTs = 0;
      let polling = true;

      async function loadDefaults(){
        const res = await fetch('/defaults');
        if(!res.ok) return;
        const d = await res.json();
        document.getElementById('live').checked = d.live;
        document.getElementById('range_limit').value = d.range_limit;
        document.getElementById('latitude').value = d.latitude;
        document.getElementById('longitude').value = d.longitude;
        document.getElementById('altitude').value = d.altitude;
      }

      async function updateMap(){
        const payload = {
          live: document.getElementById('live').checked,
          range_limit: document.getElementById('range_limit').value,
          latitude: document.getElementById('latitude').value,
          longitude: document.getElementById('longitude').value,
          altitude: document.getElementById('altitude').value,
        };
        document.getElementById('status').textContent = 'Updating...';
        const res = await fetch('/update', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
        if(res.ok){
          document.getElementById('status').textContent = 'Map updated.';
          // reload iframe with cache-bust
          document.getElementById('mapFrame').src = '/map?ts=' + Date.now();
        } else {
          const err = await res.json();
          document.getElementById('status').textContent = 'Error: ' + (err.error || res.statusText);
        }
      }

      async function pollMapTs(){
        try{
          const res = await fetch('/map_ts');
          if(!res.ok) return;
          const j = await res.json();
          if(j.ts && j.ts !== lastTs){
            lastTs = j.ts;
            document.getElementById('mapFrame').src = '/map?ts=' + lastTs;
          }
        }catch(e){ /* ignore */ }
      }

      document.getElementById('updateBtn').addEventListener('click', () => {
        // debounce manual updates
        document.getElementById('updateBtn').disabled = true;
        updateMap().finally(()=> setTimeout(()=> document.getElementById('updateBtn').disabled = false, 1000));
      });

      loadDefaults();
      // Start polling every 5 seconds
      setInterval(pollMapTs, 5000);
      // Also do an initial poll after load
      setTimeout(pollMapTs, 1000);
    </script>
  </body>
</html>
